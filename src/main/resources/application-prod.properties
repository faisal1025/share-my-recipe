spring.application.name=ShareMyRecipe
server.port=${APP_PORT}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# driver is a tool for converting in a language mysql understand
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
# dialect is a language
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQL8Dialect}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

#S3 bucket
cloud-aws-credentials-access-key=${AWS_BUCKET_ACCESS_KEY}
cloud-aws-credentials-secret-key=${AWS_BUCKET_SECRET_KEY}
cloud-aws-region-static=${AWS_BUCKET_REGION}
cloud-aws-s3-bucket=${AWS_BUCKET_NAME}

jwt-secret-key=${JWT_SECRET_KEY}

#Actuator
management.endpoint.health.show-data=active
management.endpoint.web.exposure.include=*

#Server Url
server-url=http://ec2-13-127-226-199.ap-south-1.compute.amazonaws.com/
springdoc.swagger-ui.path=/docs

#Mail
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


name: build gradle application using dockfile

on:
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout App
        uses: actions/checkout@v6

      - name: build images
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/share-my-recipe-api:${{ github.sha }} .

    

